<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Japanese Video Assignment 1</title>
    <style>
        :root { --bg:#f7f7fb; --card:#fff; --accent:#0366d6; --muted:#6b7280; }
        html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;color:#111;background:var(--bg)}
        .wrap{max-width:900px;margin:48px auto;padding:24px}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        nav a{color:var(--accent);text-decoration:none;margin-left:12px;font-weight:600}
        main{background:var(--card);border-radius:12px;padding:24px;box-shadow:0 6px 18px rgba(12,15,20,0.06)}
        video{
            width:100%;
            height:auto;
            border-radius:8px;
            background:#000;
            max-height:70vh;
            outline:none;
        }
        @media (max-width:420px){ .player-wrap{padding:12px;border-radius:8px;} h1{font-size:0.95rem;} }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>Mark Pan's Video Assignments</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main>
            <section aria-labelledby="intro">
                <h2 id="intro">Video Assignment 1</h2>
            </section>
            <section style="margin-top:18px">
                <div>
                    <video id="player" controls preload="metadata" controlsList="nodownload" aria-label="Sample video player">
                        <source src="files/video1.webm" type="video/webm">
                        Your browser does not support the video tag please use edge or chrome.
                        </video>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
