<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Japanese Video Assignments</title>
    <style>
        :root { --bg:#f7f7fb; --card:#fff; --accent:#0366d6; --muted:#6b7280; }
        html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;color:#111;background:var(--bg)}
        .wrap{max-width:900px;margin:48px auto;padding:24px}
        header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        nav a{color:var(--accent);text-decoration:none;margin-left:12px;font-weight:600}
        main{background:var(--card);border-radius:12px;padding:24px;box-shadow:0 6px 18px rgba(12,15,20,0.06)}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
        .card{padding:16px; border-radius:10px;background:#fbfdff;box-shadow:0 2px 8px rgba(12,15,20,0.04)}
        button{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer;display:block;margin:20px auto;}
        img{width:100%;border-radius:8px;margin-top:12px}
        .muted{color:var(--muted);font-size:14px;margin-top:4px}
        :disabled{background:#ccc;cursor:not-allowed}
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>Mark Pan's Video Assignments</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <main>
            <section aria-labelledby="intro">
                <h2 id="intro">Welcome</h2>
                <p class="muted">Assignments</p>
            </section>

            <section style="margin-top:18px">
                <div class="grid">
                    <div class="card">
                        <h3>Video Assignment 1</h3>
                        <img src="files/video1img.png" alt="Video Assignment 1">
                        <button><a href="assignment1.html" style="text-decoration:none;color:white;">Watch</a></button>
                    </div>
                    <div class="card">
                        <h3>Video Assignment 2</h3>
                        <p>Video Unavailable</p>
                        <button disabled>Watch</button>
                    </div>
                    <div class="card">
                        <h3>Video Assignment 3</h3>
                        <p>Video Unavailable</p>
                        <button disabled>Watch</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
